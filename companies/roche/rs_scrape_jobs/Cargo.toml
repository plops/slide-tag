[package]
name = "rs-scrape"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
log = "0.4"
async-trait = "0.1.89"
futures = "0.3"
regex = "1.12"

# Optionale Abhängigkeiten (nur kompiliert, wenn Feature aktiv)
libsql = { version = "0.9.29", default-features = false, features = ["core"], optional = true }
chromiumoxide = { version = "0.9", optional = true }
reqwest = { version = "0.13", optional = true, features = ["gzip", "brotli", "rustls"] }
rig-core = { version = "0.32", optional = true }
schemars = { version = "1.2", optional = true }

# Web, Templates & Utilities
askama = { version = "0.15", optional = true }
axum = { version = "0.8", optional = true }
tower-sessions = { version = "0.15", optional = true }
tokio-cron-scheduler = { version = "0.15", optional = true }
rand = { version = "0.10", optional = true }

[features]
default = ["db", "scraper", "ai", "web"] # Für den finalen Build
db = ["dep:libsql"]
scraper =["dep:chromiumoxide", "dep:reqwest"]
ai = ["dep:rig-core", "dep:schemars"]
web =["dep:askama", "dep:axum", "dep:tower-sessions", "dep:tokio-cron-scheduler", "dep:rand"]
