[package]
name = "rs-scrape"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
log = "0.4"

# Optionale Abhängigkeiten (nur kompiliert, wenn Feature aktiv)
libsql = { version = "0.9.29", default-features = false, features = ["core"], optional = true }
chromiumoxide = { version = "0.9", optional = true }
reqwest = { version = "0.13", optional = true }
regex = "1.10"
rig-core = { version = "0.32", optional = true }
askama = { version = "0.15", optional = true }
typst = { version = "0.14", optional = true }
futures = "0.3"

[features]
default = ["db", "scraper", "ai", "pdf"] # Für den finalen Build
db = ["dep:libsql"]
scraper = ["dep:chromiumoxide", "dep:reqwest"]
ai = ["dep:rig-core"]
pdf = ["dep:askama", "dep:typst"]
